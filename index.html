<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionGuide AR-SOP | Mühendis Paneli</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Babel CDN (Tarayıcıda JSX çalıştırmak için) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <!-- React'in yükleneceği alan -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /**
         * CDN ortamında Lucide ikonlarını güvenli şekilde render eden bileşen.
         */
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    // İkon ismini kebap-case formatına çevir (ShieldAlert -> shield-alert)
                    const kebabName = name
                        .replace(/([a-z0-9])([A-Z])/g, '$1-$2')
                        .toLowerCase();

                    iconRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', kebabName);
                    iconElement.className = className;
                    iconElement.style.width = `${size}px`;
                    iconElement.style.height = `${size}px`;
                    iconElement.style.display = 'inline-block';

                    iconRef.current.appendChild(iconElement);

                    window.lucide.createIcons({
                        attrs: {
                            width: size,
                            height: size,
                            'stroke-width': 2
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [engineerPassword, setEngineerPassword] = useState('1234'); 
            const [accessKey, setAccessKey] = useState('');
            const [authError, setAuthError] = useState('');
            
            const [library, setLibrary] = useState([
                {
                    id: 'loto',
                    title: 'LOTO (Kilitleme-Etiketleme)',
                    icon: 'ShieldAlert',
                    description: 'Enerji kesme ve güvenlik kilidi prosedürü.',
                    steps: ['Enerji kaynaklarını belirleyin.', 'Kalıntı enerjiyi boşaltın.', 'Kilidi yerleştirin.'],
                    imageUrl: 'https://images.unsplash.com/photo-1590483734724-383b853b237d?auto=format&fit=crop&q=80&w=400'
                },
                {
                    id: 'maintenance',
                    title: 'CNC Haftalık Bakım',
                    icon: 'Wrench',
                    description: 'Periyodik yağlama ve filtre kontrolü.',
                    steps: ['Yağ seviyesini kontrol edin.', 'Filtreleri temizleyin.', 'Rulmanları gresleyin.'],
                    imageUrl: 'https://images.unsplash.com/photo-1537462715879-360eeb61a0ad?auto=format&fit=crop&q=80&w=400'
                }
            ]);

            const [sopForm, setSopForm] = useState({ title: '', steps: [''] });

            const handleAuth = (e) => {
                if (e) e.preventDefault();
                if (accessKey === engineerPassword) { 
                    setIsAuthenticated(true);
                    setAuthError('');
                } else {
                    setAuthError('Geçersiz erişim anahtarı.');
                }
            };

            const handleSaveSop = () => {
                if (!sopForm.title) return;
                const newId = Math.random().toString(36).substr(2, 9);
                setLibrary([...library, { ...sopForm, id: newId, icon: 'FileText', steps: sopForm.steps.filter(s => s !== '') }]);
                setSopForm({ title: '', steps: [''] });
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-xl shadow-lg">
                                    <Icon name="Layers" size={24} className="text-white" />
                                </div>
                                <div>
                                    <h1 className="font-black text-xl text-slate-800 leading-none">VisionGuide <span className="text-blue-600 italic">AR-SOP</span></h1>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Mühendis Paneli</p>
                                </div>
                            </div>
                            {isAuthenticated && (
                                <button 
                                    onClick={() => setIsAuthenticated(false)} 
                                    className="px-4 py-2 bg-red-50 text-red-600 rounded-xl font-bold text-xs hover:bg-red-600 hover:text-white transition-all"
                                >
                                    ÇIKIŞ
                                </button>
                            )}
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 max-w-7xl mx-auto w-full p-6">
                        {!isAuthenticated ? (
                            /* Login Screen */
                            <div className="max-w-md mx-auto mt-20 p-10 bg-white border rounded-[3rem] shadow-2xl text-center space-y-8">
                                <div className="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto text-blue-600 shadow-inner">
                                    <Icon name="Lock" size={40} />
                                </div>
                                <div className="space-y-2">
                                    <h2 className="text-3xl font-black text-slate-900 tracking-tight">Erişim Anahtarı</h2>
                                    <p className="text-sm text-slate-500">Yönetim paneli için şifrenizi girin.</p>
                                </div>
                                <form onSubmit={handleAuth} className="space-y-4">
                                    <input 
                                        type="password" 
                                        placeholder="••••" 
                                        className="w-full p-5 bg-slate-50 border border-slate-200 rounded-[2rem] text-center text-2xl font-black tracking-[0.5em] outline-none focus:ring-4 ring-blue-500/10 transition-all"
                                        value={accessKey}
                                        onChange={(e) => setAccessKey(e.target.value)}
                                        autoFocus
                                    />
                                    {authError && <p className="text-xs text-red-500 font-bold bg-red-50 py-2 rounded-lg">{authError}</p>}
                                    <button type="submit" className="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-lg shadow-xl hover:bg-blue-600 transition-all">PANELİ AÇ</button>
                                </form>
                            </div>
                        ) : (
                            /* Dashboard Area */
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                {/* Form Column */}
                                <div className="lg:col-span-5 bg-white rounded-[3rem] p-8 border border-slate-200 h-fit space-y-6 shadow-sm sticky top-28">
                                    <h3 className="font-black text-slate-800 text-lg flex items-center gap-3">
                                        <div className="p-2 bg-blue-100 text-blue-600 rounded-xl"><Icon name="Plus" size={20} /></div>
                                        YENİ PROSEDÜR EKLE
                                    </h3>
                                    <div className="space-y-4">
                                        <div className="space-y-1">
                                            <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">SOP Başlığı</label>
                                            <input 
                                                type="text" 
                                                className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold outline-none focus:border-blue-400" 
                                                value={sopForm.title} 
                                                onChange={e => setSopForm({...sopForm, title: e.target.value})} 
                                            />
                                        </div>
                                        <button 
                                            onClick={handleSaveSop} 
                                            disabled={!sopForm.title}
                                            className="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-sm shadow-xl hover:bg-blue-700 transition-all disabled:opacity-30"
                                        >
                                            KAYDET VE KÜTÜPHANEYE EKLE
                                        </button>
                                    </div>
                                </div>

                                {/* List Column */}
                                <div className="lg:col-span-7 space-y-6">
                                    <div className="flex items-center justify-between px-4">
                                        <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest">AKTİF PROSEDÜRLER</h4>
                                        <div className="px-3 py-1 bg-blue-50 text-blue-600 rounded-full font-black text-[10px]">{library.length} KAYIT</div>
                                    </div>
                                    <div className="grid grid-cols-1 gap-4">
                                        {library.map(sop => (
                                            <div key={sop.id} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 flex justify-between items-center hover:border-blue-300 transition-all shadow-md group">
                                                <div className="flex items-center gap-5">
                                                    <div className="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-500 transition-colors">
                                                        <Icon name={sop.icon || 'FileText'} size={24} />
                                                    </div>
                                                    <div>
                                                        <h4 className="font-black text-slate-800 uppercase tracking-tight">{sop.title}</h4>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">{sop.steps.length} Uygulama Adımı</p>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => setLibrary(library.filter(s => s.id !== sop.id))}
                                                    className="p-3 bg-slate-50 text-slate-300 hover:bg-red-600 hover:text-white rounded-xl transition-all"
                                                >
                                                    <Icon name="Trash2" size={18} />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t border-slate-200 p-6 text-center">
                        <p className="text-[10px] text-slate-400 font-black uppercase tracking-[0.3em]">VisionGuide AR Technology © 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
