<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionGuide AR-SOP | Mühendis Paneli</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        input::placeholder { color: #cbd5e1; letter-spacing: normal; font-weight: normal; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // CDN ortamı için güvenli İkon bileşeni
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    iconRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', kebabName);
                    iconElement.className = className;
                    iconElement.style.width = `${size}px`;
                    iconElement.style.height = `${size}px`;
                    iconElement.style.display = 'inline-block';
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        attrs: { width: size, height: size, 'stroke-width': 2 },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [engineerPassword, setEngineerPassword] = useState('1234'); 
            const [accessKey, setAccessKey] = useState('');
            const [authError, setAuthError] = useState('');
            
            const [library, setLibrary] = useState([
                {
                    id: 'loto',
                    title: 'LOTO (Kilitleme-Etiketleme)',
                    icon: 'ShieldAlert',
                    description: 'Enerji kesme ve güvenlik kilidi prosedürü.',
                    steps: ['Enerji kaynaklarını belirleyin.', 'Kalıntı enerjiyi boşaltın.', 'Kilidi yerleştirin.'],
                    imageUrl: 'https://images.unsplash.com/photo-1590483734724-383b853b237d?auto=format&fit=crop&q=80&w=400'
                },
                {
                    id: 'maintenance',
                    title: 'CNC Haftalık Bakım',
                    icon: 'Wrench',
                    description: 'Periyodik yağlama ve filtre kontrolü.',
                    steps: ['Yağ seviyesini kontrol edin.', 'Filtreleri temizleyin.'],
                    imageUrl: 'https://images.unsplash.com/photo-1537462715879-360eeb61a0ad?auto=format&fit=crop&q=80&w=400'
                }
            ]);

            const [editingSopId, setEditingSopId] = useState(null);
            const [sopForm, setSopForm] = useState({ title: '', steps: [''], imageUrl: 'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=400' });

            const handleAuth = (e) => {
                if (e) e.preventDefault();
                if (accessKey === engineerPassword) { 
                    setIsAuthenticated(true);
                    setAuthError('');
                } else {
                    setAuthError('Geçersiz erişim anahtarı.');
                }
            };

            const handleSaveSop = () => {
                if (!sopForm.title) return;
                if (editingSopId) {
                    setLibrary(library.map(sop => sop.id === editingSopId ? { ...sopForm, id: editingSopId, icon: sop.icon } : sop));
                } else {
                    const newId = Math.random().toString(36).substr(2, 9);
                    setLibrary([...library, { ...sopForm, id: newId, icon: 'FileText' }]);
                }
                setEditingSopId(null);
                setSopForm({ title: '', steps: [''], imageUrl: 'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=400' });
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b p-4 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-xl">
                                    <Icon name="Layers" size={24} className="text-white" />
                                </div>
                                <h1 className="font-black text-xl text-slate-800">VisionGuide <span className="text-blue-600">AR-SOP</span></h1>
                            </div>
                            {isAuthenticated && (
                                <button onClick={() => setIsAuthenticated(false)} className="px-4 py-2 bg-red-50 text-red-600 rounded-xl font-bold text-xs">ÇIKIŞ</button>
                            )}
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full p-6">
                        {!isAuthenticated ? (
                            <div className="max-w-md mx-auto mt-20 p-10 bg-white rounded-[3rem] shadow-2xl text-center space-y-8">
                                <div className="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto text-blue-600">
                                    <Icon name="Lock" size={40} />
                                </div>
                                <h2 className="text-3xl font-black">Erişim Anahtarı</h2>
                                <form onSubmit={handleAuth} className="space-y-4">
                                    <input 
                                        type="password" 
                                        placeholder="••••" 
                                        className="w-full p-5 bg-slate-50 border rounded-[2rem] text-center text-2xl font-black outline-none focus:ring-4 ring-blue-500/10"
                                        value={accessKey}
                                        onChange={(e) => setAccessKey(e.target.value)}
                                    />
                                    {authError && <p className="text-xs text-red-500 font-bold">{authError}</p>}
                                    <button type="submit" className="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-lg shadow-xl hover:bg-blue-600 transition-all">PANELİ AÇ</button>
                                </form>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                <div className="lg:col-span-5 bg-white rounded-[3rem] p-8 border h-fit space-y-6 shadow-sm">
                                    <h3 className="font-black text-lg flex items-center gap-3">
                                        <Icon name="Plus" className="text-blue-600" /> PROSEDÜR EKLE
                                    </h3>
                                    <input type="text" placeholder="SOP Başlığı" className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold outline-none" value={sopForm.title} onChange={e => setSopForm({...sopForm, title: e.target.value})} />
                                    <button onClick={handleSaveSop} className="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black shadow-xl">KAYDET</button>
                                </div>

                                <div className="lg:col-span-7 space-y-6">
                                    <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest">AKTİF PROSEDÜRLER ({library.length})</h4>
                                    {library.map(sop => (
                                        <div key={sop.id} className="bg-white p-6 rounded-[2.5rem] border flex justify-between items-center shadow-md">
                                            <div className="flex items-center gap-5">
                                                <div className="w-16 h-16 bg-slate-50 rounded-[1.5rem] flex items-center justify-center">
                                                    <Icon name={sop.icon} size={28} />
                                                </div>
                                                <h4 className="font-black text-slate-800 uppercase">{sop.title}</h4>
                                            </div>
                                            <button onClick={() => setLibrary(library.filter(s => s.id !== sop.id))} className="p-3 bg-red-50 text-red-500 rounded-xl"><Icon name="Trash2" size={18} /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="p-6 text-center text-[10px] text-slate-400 font-black uppercase tracking-widest">VisionGuide AR © 2026</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
